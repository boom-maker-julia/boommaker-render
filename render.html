<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Boom Maker — render</title>
<meta name="viewport" content="width=1080,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #07070A; font-family: 'Geist', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  /* Largeur fixe 1080 ; la hauteur s'adapte au format (1080 carré / 1350 portrait Instagram)
     pour que HCTI (selector=#render-root) capture toute l'image sans la couper. */
  #render-root { width: 1080px; }
  #render-root > * { display: block; }
</style>
</head>
<body>
<div id="render-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="templates/bm-shared.jsx"></script>
<script type="text/babel" src="templates/bm-tip.jsx"></script>
<script type="text/babel" src="templates/bm-cover.jsx"></script>
<script type="text/babel" src="templates/bm-case.jsx"></script>
<script type="text/babel" src="templates/bm-carousel.jsx"></script>
<script type="text/babel" src="templates/bm-tool.jsx"></script>
<script type="text/babel" src="templates/bm-blog.jsx"></script>

<script type="text/babel" data-presets="env,react">
const params = new URLSearchParams(window.location.search);
const get = (k, fallback) => params.has(k) ? params.get(k) : fallback;
const getBool = (k, fallback) => {
  if (!params.has(k)) return fallback;
  const v = params.get(k).toLowerCase();
  return v === "1" || v === "true" || v === "yes" || v === "on";
};
const getNum = (k, fallback) => {
  if (!params.has(k)) return fallback;
  const n = Number(params.get(k));
  return Number.isNaN(n) ? fallback : n;
};

const template = get("template", "tip"); // tip | cover | case | tool | blog | carousel
const theme    = get("theme", "dark");   // dark | light
const showLogo = getBool("showLogo", true);
const accent   = get("accent", (template === "cover" || template === "carousel" || template === "tool") ? "boom" : template === "case" ? "cyan" : "violet");
const font     = get("font", "geist");
// format=ig → Instagram 1080×1350 (portrait) ; sinon carré 1080×1080
const fmt      = (get("format", "") === "ig") ? "portrait" : "square";

// font override
const fontMap = {
  geist:   "'Geist'",
  inter:   "'Inter'",
  grotesk: "'Space Grotesk'",
};
const sans = fontMap[font] || fontMap.geist;
const styleEl = document.createElement("style");
styleEl.textContent = `.bm-frame, .bm-frame h1, .bm-frame p, .bm-frame div, .bm-frame span { font-family: ${sans}, 'Helvetica Neue', Arial, sans-serif; }`;
document.head.appendChild(styleEl);

let element = null;

if (template === "tip") {
  const data = {
    tipNumber: getNum("tipNumber", 7),
    eyebrow:   get("tipEyebrow", "Astuce no-code"),
    title:     get("tipTitle", "Automatisez d'abord"),
    titleEm:   get("tipTitleEm", "ce qui vous coûte une heure par jour."),
    body:      get("tipBody", "Avant de viser l'agent IA qui fait tout, scriptez les 3 micro-tâches qui mangent vos matinées."),
    points: [
      { tag: get("tipP1Tag", "REPÉRER"),    text: get("tipP1Text", "Listez les 5 actions répétées chaque semaine.") },
      { tag: get("tipP2Tag", "MESURER"),    text: get("tipP2Text", "Chronométrez. Sous 15min/jour, ça vaut le coup.") },
      { tag: get("tipP3Tag", "DÉCLENCHER"), text: get("tipP3Text", "Un trigger clair → un workflow → un résultat.") },
    ],
    footerNote: get("tipFooter", "boommaker.io"),
  };
  element = <ThemedTip data={data} showLogo={showLogo} theme={theme} accent={accent} format={fmt} />;
}

if (template === "cover") {
  const data = {
    kicker:       get("coverKicker", "Boom Maker — Playbook"),
    title1:       get("coverTitle1", "5 workflows"),
    titleEm:      get("coverTitleEm", "qui font gagner"),
    title2:       get("coverTitle2", "10h / semaine."),
    subtitle:     get("coverSubtitle", "Le carrousel à lire avant d'embaucher pour copier-coller des leads."),
    totalSlides:  getNum("coverTotalSlides", 8),
    swipeText:    get("coverSwipe", "Swipe"),
  };
  element = <TemplateCover data={data} showLogo={showLogo} accent={accent} theme={theme} format={fmt} />;
}

if (template === "case") {
  const data = {
    sector:       get("caseSector", "E-COMMERCE / DTC"),
    clientName:   get("caseClient", "Atelier Verel"),
    headline:     get("caseHeadline", "On a remplacé 4 outils SaaS par"),
    headlineEm:   get("caseHeadlineEm", "un seul agent IA."),
    metric:       get("caseMetric", "−68"),
    metricUnit:   get("caseMetricUnit", "%"),
    metricLabel:  get("caseMetricLabel", "Coût opérationnel mensuel"),
    deltaLabel:   get("caseDelta", "÷ 3,1"),
    before:       get("caseBefore", "2 840 €/mois"),
    after:        get("caseAfter", "910 €/mois"),
    proofs: [
      get("caseProof1", "Setup en 11 jours"),
      get("caseProof2", "0 ligne de code"),
      get("caseProof3", "ROI < 6 semaines"),
    ],
    footerHandle: get("caseFooter", "boommaker.io / cas-clients"),
  };
  element = <TemplateCase data={data} showLogo={showLogo} accent={accent} theme={theme} format={fmt} />;
}

if (template === "tool") {
  const data = {
    pickNumber: getNum("toolPickNumber", 1),
    category:   get("toolCategory", "Automatisation / No-code"),
    toolName:   get("toolName", "Make.com"),
    tagline:    get("toolTagline", "Le couteau suisse des scénarios"),
    headline:   get("toolHeadline", "L'outil qui m'a permis"),
    headlineEm: get("toolHeadlineEm", "d'arrêter de copier-coller."),
    rating:     getNum("toolRating", 5),
    ratingMax:  getNum("toolRatingMax", 5),
    why1:       get("toolWhy1", ""),
    why2:       get("toolWhy2", ""),
    why3:       get("toolWhy3", ""),
    useCase:    get("toolUseCase", ""),
    footerHandle: get("toolFooter", "boommaker.io"),
  };
  element = <TemplateTool data={data} showLogo={showLogo} accent={accent} theme={theme} format={fmt} />;
}

if (template === "blog") {
  const data = {
    category:      get("blogCategory", "Automatisation"),
    articleNumber: getNum("blogArticleNumber", 1),
    title:         get("blogTitle", "Comment j'ai remplacé"),
    titleEm:       get("blogTitleEm", "ma boîte mail par un agent IA."),
    excerpt:       get("blogExcerpt", ""),
    readTime:      get("blogReadTime", "5 min"),
    publishDate:   get("blogPublishDate", ""),
    author:        get("blogAuthor", "Julia Levy"),
    imageUrl:      get("blogImageUrl", ""),
    footerHandle:  get("blogFooter", "boommaker.io"),
  };
  element = <TemplateBlog data={data} showLogo={showLogo} accent={accent} theme={theme} format={fmt} />;
}

// Carrousel complet : 1 ligne = 5 slides. On choisit la slide via ?slide=1..5
// 1 = couverture · 2-4 = workflows 01/02/03 · 5 = CTA finale
if (template === "carousel") {
  const slide = getNum("slide", 1);
  const total = getNum("coverTotalSlides", 5);
  const kicker = get("kicker", "Playbook — Workflows");

  const wf = (n, defaults) => ({
    kicker,
    number: String(n).padStart(2, "0"),
    title1:  get(`wf${n}Title`,    defaults.title1),
    titleEm: get(`wf${n}TitleEm`,  defaults.titleEm),
    body:    get(`wf${n}Body`,     defaults.body),
    steps: [
      { tag: get(`wf${n}T1`, defaults.tags[0]), text: get(`wf${n}S1`, defaults.steps[0]) },
      { tag: get(`wf${n}T2`, defaults.tags[1]), text: get(`wf${n}S2`, defaults.steps[1]) },
      { tag: get(`wf${n}T3`, defaults.tags[2]), text: get(`wf${n}S3`, defaults.steps[2]) },
    ],
    statValue: get(`wf${n}Stat`, defaults.stat),
    statLabel: get(`wf${n}StatLabel`, "Gagnées / sem."),
  });

  if (slide === 1) {
    const data = {
      kicker:      get("coverKicker", "Boom Maker — Playbook"),
      title1:      get("coverTitle1", "3 workflows"),
      titleEm:     get("coverTitleEm", "qui font gagner"),
      title2:      get("coverTitle2", "10h / semaine."),
      subtitle:    get("coverSubtitle", "Le carrousel à lire avant de payer un stagiaire pour copier-coller des leads dans Notion."),
      totalSlides: total,
      swipeText:   get("coverSwipe", "Swipe"),
    };
    element = <TemplateCover data={data} showLogo={showLogo} accent={accent} theme={theme} />;
  } else if (slide >= 2 && slide <= 4) {
    // slide 2 → workflow 01 (wf1), slide 3 → wf2, slide 4 → wf3
    const presets = {
      1: { title1: "La capture de leads", titleEm: "qui se range seule.",
           body: "Un formulaire qui enrichit, score et range chaque lead dans le CRM — pendant que tu fais autre chose.",
           tags: ["Repérer", "Enrichir", "Ranger"],
           steps: ["Formulaire → trigger", "Enrichissement IA", "CRM + ping Slack"], stat: "≈ 4h" },
      2: { title1: "Le reporting", titleEm: "qui s'écrit la nuit.",
           body: "Les chiffres se collectent, le dashboard se met à jour, l'IA rédige le résumé. Tu lis, tu valides, c'est tout.",
           tags: ["Collecter", "Agréger", "Diffuser"],
           steps: ["Collecte des sources", "Dashboard auto", "Résumé IA par email"], stat: "≈ 3h" },
      3: { title1: "Le SAV", titleEm: "qui répond avant toi.",
           body: "Chaque ticket est trié, le brouillon de réponse est prêt. Tu n'as plus qu'à relire et envoyer.",
           tags: ["Recevoir", "Trier", "Répondre"],
           steps: ["Ticket entrant", "Tri + priorité IA", "Brouillon prêt"], stat: "≈ 3h" },
    };
    const wfNum = slide - 1;
    element = <TemplateCarouselContent data={wf(wfNum, presets[wfNum])} showLogo={showLogo} accent={accent} theme={theme} index={slide} total={total} />;
  } else {
    const recap = [
      `${get("wf1Title", "La capture de leads")} ${get("wf1TitleEm", "qui se range seule.")}`,
      `${get("wf2Title", "Le reporting")} ${get("wf2TitleEm", "qui s'écrit la nuit.")}`,
      `${get("wf3Title", "Le SAV")} ${get("wf3TitleEm", "qui répond avant toi.")}`,
    ];
    const data = {
      kicker,
      title1:   get("ctaTitle1", "Et si on automatisait"),
      titleEm:  get("ctaTitleEm", "les vôtres ?"),
      title2:   get("ctaTitle2", ""),
      subtitle: get("ctaSubtitle", "On audite vos process, on repère les 3 workflows à plus fort ROI, et on vous livre un plan clair."),
      recap,
      ctaText:  get("ctaText", "Réserver un audit gratuit"),
      ctaUrl:   get("ctaUrl", "boommaker.io / audit"),
    };
    element = <TemplateCarouselCTA data={data} showLogo={showLogo} accent={accent} theme={theme} index={slide} total={total} />;
  }
}

if (!element) {
  element = <div style={{ padding: 80, color: "#fff", fontSize: 24 }}>
    Param <code>?template=</code> manquant. Valeurs : <code>tip</code>, <code>cover</code>, <code>case</code>, <code>carousel</code> (avec <code>&slide=1..5</code>).
  </div>;
}

ReactDOM.createRoot(document.getElementById("render-root")).render(element);

// Signal "ready" for screenshot services that can wait on a flag
window.addEventListener("load", () => {
  setTimeout(() => {
    document.body.setAttribute("data-render-ready", "true");
  }, 800); // let fonts settle
});
</script>
</body>
</html>
